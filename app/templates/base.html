<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Finance Tracker{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
</head>
<body>
  <nav>
    <span class="nav-brand">Finance Tracker</span>
    <a href="/dashboard" {% if request.url.path in ['/', '/dashboard'] %}class="active"{% endif %}>Dashboard</a>
    <a href="/upload" {% if request.url.path.startswith('/upload') %}class="active"{% endif %}>Upload</a>
    <a href="/review" {% if request.url.path.startswith('/review') %}class="active"{% endif %}>Review</a>
    <a href="/transactions" {% if request.url.path.startswith('/transactions') %}class="active"{% endif %}>Transactions</a>
    <a href="/balances" {% if request.url.path.startswith('/balances') %}class="active"{% endif %}>Balances</a>
    <a href="/portfolio" {% if request.url.path.startswith('/portfolio') %}class="active"{% endif %}>Portfolio</a>
    {% if current_user is defined and current_user %}
    <span class="nav-user">{{ current_user.display_name or current_user.email }}</span>
    <a href="/logout" class="nav-logout">Sign out</a>
    {% endif %}
  </nav>
  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/js/main.js"></script>
</body>
</html>
